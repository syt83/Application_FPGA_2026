<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 600">
<style>
  text { font-family: 'Segoe UI', Arial, sans-serif; }
  .title { font-size: 16px; font-weight: bold; fill: #1B4F72; }
  .label-b { font-size: 12px; fill: #2C3E50; font-weight: bold; }
  .label-s { font-size: 10px; fill: #666; }
  .sig { font-size: 10px; fill: #E67E22; font-weight: bold; }
  .sigG { font-size: 10px; fill: #1E8449; font-weight: bold; }
  .sigP { font-size: 10px; fill: #8E44AD; font-weight: bold; }
  .sigR { font-size: 10px; fill: #E74C3C; font-weight: bold; }
  .rst { font-family: 'Courier New', monospace; font-size: 9px; fill: #E74C3C; }
</style>
<defs>
  <marker id="mg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="#1E8449"/></marker>
  <marker id="mo" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="#E67E22"/></marker>
  <marker id="mp" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="#8E44AD"/></marker>
  <marker id="mr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="#E74C3C"/></marker>
  <marker id="my" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="#666"/></marker>
  <marker id="mb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="#1B4F72"/></marker>
</defs>
<text x="390" y="24" text-anchor="middle" class="title">Stopwatch — Top Module Interconnect</text>

<!-- ══════════════════════════════════════════════════ -->
<!-- ROW 1 (y=60~100)                                  -->
<!-- ══════════════════════════════════════════════════ -->

<text x="10" y="58" class="label-b" fill="#AAA">KEY[0]</text>
<text x="10" y="72" class="label-s" fill="#AAA">(rst_n)</text>

<text x="10" y="95" class="label-b" fill="#1B4F72">KEY[1]</text>
<text x="10" y="109" class="label-s">(start/stop)</text>
<line x1="68" y1="98" x2="88" y2="98" stroke="#666" stroke-width="1.5" marker-end="url(#my)"/>

<!-- u_db1 -->
<rect x="90" y="82" width="120" height="36" rx="5" fill="#FDEBD0" stroke="#E67E22" stroke-width="1.5"/>
<text x="150" y="98" text-anchor="middle" class="label-b" fill="#E67E22">btn_debounce</text>
<text x="150" y="111" text-anchor="middle" class="label-s">u_db1</text>
<line x1="125" y1="67" x2="125" y2="82" stroke="#E74C3C" stroke-width="1.2"/>
<text x="132" y="72" class="rst">rst_n</text>

<!-- Toggle FF -->
<rect x="260" y="82" width="95" height="36" rx="5" fill="#D6EAF8" stroke="#1B4F72" stroke-width="1.5"/>
<text x="307" y="98" text-anchor="middle" class="label-b" fill="#1B4F72">Toggle FF</text>
<text x="307" y="111" text-anchor="middle" class="label-s">running</text>
<line x1="290" y1="67" x2="290" y2="82" stroke="#E74C3C" stroke-width="1.2"/>
<text x="297" y="72" class="rst">rst_n</text>

<!-- u_db1 -> Toggle -->
<line x1="210" y1="98" x2="258" y2="98" stroke="#E67E22" stroke-width="1.5" marker-end="url(#mo)"/>
<text x="232" y="91" class="sig">btn_ss</text>

<!-- Prescaler -->
<rect x="405" y="82" width="130" height="36" rx="5" fill="#D5F5E3" stroke="#1E8449" stroke-width="1.5"/>
<text x="470" y="98" text-anchor="middle" class="label-b" fill="#1E8449">prescaler_100hz</text>
<text x="470" y="111" text-anchor="middle" class="label-s">50MHz → 100Hz</text>
<line x1="440" y1="67" x2="440" y2="82" stroke="#E74C3C" stroke-width="1.2"/>
<text x="447" y="72" class="rst">rst_n</text>

<!-- Toggle -> Prescaler -->
<line x1="355" y1="98" x2="403" y2="98" stroke="#1B4F72" stroke-width="1.5" marker-end="url(#mb)"/>
<text x="376" y="91" class="sigG">enable</text>

<!-- running -> LED[0] -->
<line x1="307" y1="118" x2="307" y2="132" stroke="#E74C3C" stroke-width="1.5"/>
<line x1="307" y1="132" x2="700" y2="132" stroke="#E74C3C" stroke-width="1.5"/>
<line x1="700" y1="132" x2="700" y2="148" stroke="#E74C3C" stroke-width="1.5" marker-end="url(#mr)"/>
<text x="705" y="147" class="label-b" fill="#E74C3C">LED[0]</text>
<text x="705" y="161" class="label-s">running</text>
<text x="510" y="127" class="sigR">running</text>

<!-- ══════════════════════════════════════════════════ -->
<!-- ROW 2 (y=185~245): BCD Chain                      -->
<!-- d0:60..170  d1:215..325  d2:370..480  d3:525..635 -->
<!-- ══════════════════════════════════════════════════ -->

<!-- tick -> d0 -->
<line x1="470" y1="118" x2="470" y2="160" stroke="#1E8449" stroke-width="1.5"/>
<line x1="470" y1="160" x2="115" y2="160" stroke="#1E8449" stroke-width="1.5"/>
<line x1="115" y1="160" x2="115" y2="183" stroke="#1E8449" stroke-width="1.5" marker-end="url(#mg)"/>
<text x="290" y="155" text-anchor="middle" class="sigG">tick_100hz</text>

<!-- d0 -->
<rect x="60" y="185" width="110" height="55" rx="5" fill="#D5F5E3" stroke="#1E8449" stroke-width="2"/>
<text x="115" y="205" text-anchor="middle" class="label-b" fill="#1E8449">bcd_digit</text>
<text x="115" y="220" text-anchor="middle" class="label-s">d0 (cs_lo, 0.01s)</text>
<line x1="90" y1="172" x2="90" y2="185" stroke="#E74C3C" stroke-width="1.2"/>
<text x="97" y="179" class="rst">rst_n</text>

<!-- d1 -->
<rect x="215" y="185" width="110" height="55" rx="5" fill="#D5F5E3" stroke="#1E8449" stroke-width="2"/>
<text x="270" y="205" text-anchor="middle" class="label-b" fill="#1E8449">bcd_digit</text>
<text x="270" y="220" text-anchor="middle" class="label-s">d1 (cs_hi, 0.1s)</text>
<line x1="245" y1="172" x2="245" y2="185" stroke="#E74C3C" stroke-width="1.2"/>

<!-- d2 -->
<rect x="370" y="185" width="110" height="55" rx="5" fill="#D5F5E3" stroke="#1E8449" stroke-width="2"/>
<text x="425" y="205" text-anchor="middle" class="label-b" fill="#1E8449">bcd_digit</text>
<text x="425" y="220" text-anchor="middle" class="label-s">d2 (sec_lo, 1s)</text>
<line x1="400" y1="172" x2="400" y2="185" stroke="#E74C3C" stroke-width="1.2"/>

<!-- d3 -->
<rect x="525" y="185" width="110" height="55" rx="5" fill="#D5F5E3" stroke="#1E8449" stroke-width="2"/>
<text x="580" y="205" text-anchor="middle" class="label-b" fill="#1E8449">bcd_digit</text>
<text x="580" y="220" text-anchor="middle" class="label-s">d3 (sec_hi, 10s)</text>
<line x1="555" y1="172" x2="555" y2="185" stroke="#E74C3C" stroke-width="1.2"/>

<!-- carry chain -->
<line x1="170" y1="207" x2="213" y2="207" stroke="#1E8449" stroke-width="1.5" marker-end="url(#mg)"/>
<text x="189" y="200" class="sigG">carry</text>
<line x1="325" y1="207" x2="368" y2="207" stroke="#1E8449" stroke-width="1.5" marker-end="url(#mg)"/>
<text x="344" y="200" class="sigG">carry</text>
<line x1="480" y1="207" x2="523" y2="207" stroke="#1E8449" stroke-width="1.5" marker-end="url(#mg)"/>
<text x="499" y="200" class="sigG">carry</text>

<!-- ══════════════════════════════════════════════════ -->
<!-- ROW 3 (y=315~355): u_db2 + Lap Hold               -->
<!-- ══════════════════════════════════════════════════ -->

<!-- 4 independent digit lines: BCD -> Lap Hold -->
<line x1="115" y1="240" x2="115" y2="270" stroke="#1E8449" stroke-width="1.5"/>
<line x1="115" y1="270" x2="300" y2="270" stroke="#1E8449" stroke-width="1"/>
<line x1="300" y1="270" x2="300" y2="313" stroke="#1E8449" stroke-width="1.5" marker-end="url(#mg)"/>
<text x="210" y="265" class="sigG">cs_lo</text>

<line x1="270" y1="240" x2="270" y2="275" stroke="#1E8449" stroke-width="1.5"/>
<line x1="270" y1="275" x2="370" y2="275" stroke="#1E8449" stroke-width="1"/>
<line x1="370" y1="275" x2="370" y2="313" stroke="#1E8449" stroke-width="1.5" marker-end="url(#mg)"/>
<text x="322" y="270" class="sigG">cs_hi</text>

<line x1="425" y1="240" x2="425" y2="280" stroke="#1E8449" stroke-width="1.5"/>
<line x1="425" y1="280" x2="440" y2="280" stroke="#1E8449" stroke-width="1"/>
<line x1="440" y1="280" x2="440" y2="313" stroke="#1E8449" stroke-width="1.5" marker-end="url(#mg)"/>
<text x="432" y="300" class="sigG">sec_lo</text>

<line x1="580" y1="240" x2="580" y2="270" stroke="#1E8449" stroke-width="1.5"/>
<line x1="580" y1="270" x2="510" y2="270" stroke="#1E8449" stroke-width="1"/>
<line x1="510" y1="270" x2="510" y2="313" stroke="#1E8449" stroke-width="1.5" marker-end="url(#mg)"/>
<text x="542" y="265" class="sigG">sec_hi</text>

<!-- KEY[2] -->
<text x="10" y="335" class="label-b" fill="#1B4F72">KEY[2]</text>
<text x="10" y="349" class="label-s">(lap)</text>
<line x1="50" y1="338" x2="88" y2="338" stroke="#666" stroke-width="1.5" marker-end="url(#my)"/>

<!-- u_db2 -->
<rect x="90" y="318" width="120" height="36" rx="5" fill="#FDEBD0" stroke="#E67E22" stroke-width="1.5"/>
<text x="150" y="334" text-anchor="middle" class="label-b" fill="#E67E22">btn_debounce</text>
<text x="150" y="347" text-anchor="middle" class="label-s">u_db2</text>
<line x1="125" y1="303" x2="125" y2="318" stroke="#E74C3C" stroke-width="1.2"/>
<text x="132" y="311" class="rst">rst_n</text>

<!-- Lap Hold -->
<rect x="270" y="318" width="270" height="36" rx="5" fill="#D6EAF8" stroke="#1B4F72" stroke-width="1.5"/>
<text x="405" y="334" text-anchor="middle" class="label-b" fill="#1B4F72">Lap Hold Register</text>
<text x="405" y="347" text-anchor="middle" class="label-s">toggle: freeze display, counter keeps running</text>
<line x1="310" y1="303" x2="310" y2="318" stroke="#E74C3C" stroke-width="1.2"/>
<text x="317" y="311" class="rst">rst_n</text>

<!-- u_db2 -> Lap Hold -->
<line x1="210" y1="338" x2="268" y2="338" stroke="#E67E22" stroke-width="1.5" marker-end="url(#mo)"/>
<text x="236" y="331" class="sig">btn_lap</text>

<!-- ══════════════════════════════════════════════════ -->
<!-- ROW 4 (y=400~440): seg7_decoder x4                -->
<!-- ══════════════════════════════════════════════════ -->

<rect x="60" y="400" width="110" height="36" rx="5" fill="#E8DAEF" stroke="#8E44AD" stroke-width="1.5"/>
<text x="115" y="416" text-anchor="middle" class="label-b" fill="#8E44AD">seg7_decoder</text>
<text x="115" y="430" text-anchor="middle" class="label-s">u_h0</text>

<rect x="215" y="400" width="110" height="36" rx="5" fill="#E8DAEF" stroke="#8E44AD" stroke-width="1.5"/>
<text x="270" y="416" text-anchor="middle" class="label-b" fill="#8E44AD">seg7_decoder</text>
<text x="270" y="430" text-anchor="middle" class="label-s">u_h1</text>

<rect x="370" y="400" width="110" height="36" rx="5" fill="#E8DAEF" stroke="#8E44AD" stroke-width="1.5"/>
<text x="425" y="416" text-anchor="middle" class="label-b" fill="#8E44AD">seg7_decoder</text>
<text x="425" y="430" text-anchor="middle" class="label-s">u_h2</text>

<rect x="525" y="400" width="110" height="36" rx="5" fill="#E8DAEF" stroke="#8E44AD" stroke-width="1.5"/>
<text x="580" y="416" text-anchor="middle" class="label-b" fill="#8E44AD">seg7_decoder</text>
<text x="580" y="430" text-anchor="middle" class="label-s">u_h3</text>

<!-- Lap Hold -> seg7 -->
<line x1="300" y1="354" x2="300" y2="373" stroke="#8E44AD" stroke-width="1.5"/>
<line x1="300" y1="373" x2="115" y2="373" stroke="#8E44AD" stroke-width="1.5"/>
<line x1="115" y1="373" x2="115" y2="398" stroke="#8E44AD" stroke-width="1.5" marker-end="url(#mp)"/>
<text x="205" y="369" class="sigP">dh0</text>

<line x1="370" y1="354" x2="370" y2="378" stroke="#8E44AD" stroke-width="1.5"/>
<line x1="370" y1="378" x2="270" y2="378" stroke="#8E44AD" stroke-width="1.5"/>
<line x1="270" y1="378" x2="270" y2="398" stroke="#8E44AD" stroke-width="1.5" marker-end="url(#mp)"/>
<text x="318" y="375" class="sigP">dh1</text>

<line x1="440" y1="354" x2="440" y2="378" stroke="#8E44AD" stroke-width="1.5"/>
<line x1="440" y1="378" x2="425" y2="378" stroke="#8E44AD" stroke-width="1.5"/>
<line x1="425" y1="378" x2="425" y2="398" stroke="#8E44AD" stroke-width="1.5" marker-end="url(#mp)"/>
<text x="443" y="375" class="sigP">dh2</text>

<line x1="510" y1="354" x2="510" y2="373" stroke="#8E44AD" stroke-width="1.5"/>
<line x1="510" y1="373" x2="580" y2="373" stroke="#8E44AD" stroke-width="1.5"/>
<line x1="580" y1="373" x2="580" y2="398" stroke="#8E44AD" stroke-width="1.5" marker-end="url(#mp)"/>
<text x="543" y="369" class="sigP">dh3</text>

<!-- ══════════════════════════════════════════════════ -->
<!-- ROW 5: HEX Outputs                                -->
<!-- ══════════════════════════════════════════════════ -->

<line x1="115" y1="436" x2="115" y2="462" stroke="#E74C3C" stroke-width="1.5" marker-end="url(#mr)"/>
<text x="115" y="477" text-anchor="middle" class="label-b" fill="#E74C3C">HEX0</text>
<text x="115" y="491" text-anchor="middle" class="label-s">cs_lo (0.01s)</text>

<line x1="270" y1="436" x2="270" y2="462" stroke="#E74C3C" stroke-width="1.5" marker-end="url(#mr)"/>
<text x="270" y="477" text-anchor="middle" class="label-b" fill="#E74C3C">HEX1</text>
<text x="270" y="491" text-anchor="middle" class="label-s">cs_hi (0.1s)</text>

<line x1="425" y1="436" x2="425" y2="462" stroke="#E74C3C" stroke-width="1.5" marker-end="url(#mr)"/>
<text x="425" y="477" text-anchor="middle" class="label-b" fill="#E74C3C">HEX2</text>
<text x="425" y="491" text-anchor="middle" class="label-s">sec_lo (1s)</text>

<line x1="580" y1="436" x2="580" y2="462" stroke="#E74C3C" stroke-width="1.5" marker-end="url(#mr)"/>
<text x="580" y="477" text-anchor="middle" class="label-b" fill="#E74C3C">HEX3</text>
<text x="580" y="491" text-anchor="middle" class="label-s">sec_hi (10s)</text>

<!-- ══════════════════════════════════════════════════ -->
<!-- CLOCK_50 + Legend                                 -->
<!-- ══════════════════════════════════════════════════ -->

<text x="10" y="530" class="label-b" fill="#8E44AD">CLOCK_50</text>
<line x1="80" y1="527" x2="680" y2="527" stroke="#8E44AD" stroke-width="1" stroke-dasharray="4,2"/>
<text x="390" y="542" text-anchor="middle" class="label-s" fill="#8E44AD">clk (shared to all sequential modules)</text>

<rect x="15" y="560" width="750" height="30" rx="4" fill="#F8F9FA" stroke="#AEB6BF"/>
<text x="390" y="573" text-anchor="middle" class="label-s">Display:  HEX3  HEX2 . HEX1  HEX0  =  SS . CC</text>
<text x="390" y="586" text-anchor="middle" class="label-s">LED[0] = running    |    Lap button toggles display freeze (counter keeps running)</text>
</svg>
