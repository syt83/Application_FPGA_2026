<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 520">
<style>
  text { font-family: 'Segoe UI', Arial, sans-serif; }
  .title { font-size: 16px; font-weight: bold; fill: #1B4F72; }
  .subtitle { font-size: 13px; font-weight: bold; }
  .label-b { font-size: 11px; fill: #2C3E50; font-weight: bold; }
  .label-s { font-size: 10px; fill: #666; }
  .val { font-size: 10px; fill: #1B4F72; font-weight: bold; }
  .warn { font-size: 10px; fill: #E74C3C; font-weight: bold; }
  .good { font-size: 10px; fill: #1E8449; font-weight: bold; }
</style>
<text x="390" y="22" text-anchor="middle" class="title">Derived Clock vs Clock Enable — Timing Comparison</text>

<!-- ═══════════════════════════════════════════════ -->
<!-- Method A: Derived Clock (top half)             -->
<!-- ═══════════════════════════════════════════════ -->
<text x="15" y="52" class="subtitle" fill="#E74C3C">Method A: Derived Clock (NOT recommended)</text>

<!-- clk_50m -->
<text x="15" y="80" class="label-b">clk_50m</text>
<g transform="translate(100,64)">
  <polyline points="0,18 0,0 15,0 15,18 30,18 30,0 45,0 45,18 60,18 60,0 75,0 75,18 90,18 90,0 105,0 105,18 120,18 120,0 135,0 135,18 150,18 150,0 165,0 165,18 180,18 180,0 195,0 195,18 210,18 210,0 225,0 225,18 240,18 240,0 255,0 255,18 270,18 270,0 285,0 285,18 300,18 300,0 315,0 315,18 330,18 330,0 345,0 345,18 360,18 360,0 375,0 375,18 390,18 390,0 405,0 405,18 420,18 420,0 435,0 435,18 450,18 450,0 465,0 465,18 480,18 480,0 495,0 495,18 510,18 510,0 525,0 525,18 540,18 540,0 555,0 555,18 570,18 570,0 585,0 585,18 600,18" fill="none" stroke="#1B4F72" stroke-width="1.5"/>
</g>

<!-- clk_100hz (derived, slow toggle) -->
<text x="15" y="118" class="label-b" fill="#E74C3C">clk_100hz</text>
<text x="15" y="130" class="label-s" fill="#E74C3C">(FF output!)</text>
<g transform="translate(100,102)">
  <polyline points="0,18 150,18 150,0 300,0 300,18 450,18 450,0 600,0" fill="none" stroke="#E74C3C" stroke-width="2.5"/>
</g>

<!-- digit driven by clk_100hz -->
<text x="15" y="160" class="label-b">digit</text>
<text x="15" y="172" class="label-s">(clk=100hz)</text>
<g transform="translate(100,145)">
  <!-- changes on posedge of clk_100hz = at x=150, 450 -->
  <rect x="0" y="0" width="150" height="24" fill="#FADBD8" stroke="#E74C3C" rx="2"/>
  <text x="75" y="16" text-anchor="middle" class="val">0</text>
  <rect x="150" y="0" width="300" height="24" fill="#FADBD8" stroke="#E74C3C" rx="2"/>
  <text x="300" y="16" text-anchor="middle" class="val">1</text>
  <rect x="450" y="0" width="150" height="24" fill="#FADBD8" stroke="#E74C3C" rx="2"/>
  <text x="525" y="16" text-anchor="middle" class="val">2</text>
</g>

<!-- Problem annotations for Method A -->
<g transform="translate(100,180)">
  <!-- skew indicator -->
  <line x1="150" y1="0" x2="150" y2="-38" stroke="#E74C3C" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="300" y1="0" x2="300" y2="-82" stroke="#E74C3C" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="155" y="12" class="warn">↑ posedge from FF output</text>
  <text x="155" y="25" class="warn">  clock skew varies per FF</text>
  <text x="155" y="38" class="warn">  CDC needed to read from 50MHz domain</text>
</g>

<!-- ═══════════════════════════════════════════════ -->
<!-- Method B: Clock Enable (bottom half)           -->
<!-- ═══════════════════════════════════════════════ -->
<text x="15" y="245" class="subtitle" fill="#1E8449">Method B: Clock Enable (RECOMMENDED)</text>

<!-- clk_50m (same) -->
<text x="15" y="273" class="label-b">clk_50m</text>
<g transform="translate(100,257)">
  <polyline points="0,18 0,0 15,0 15,18 30,18 30,0 45,0 45,18 60,18 60,0 75,0 75,18 90,18 90,0 105,0 105,18 120,18 120,0 135,0 135,18 150,18 150,0 165,0 165,18 180,18 180,0 195,0 195,18 210,18 210,0 225,0 225,18 240,18 240,0 255,0 255,18 270,18 270,0 285,0 285,18 300,18 300,0 315,0 315,18 330,18 330,0 345,0 345,18 360,18 360,0 375,0 375,18 390,18 390,0 405,0 405,18 420,18 420,0 435,0 435,18 450,18 450,0 465,0 465,18 480,18 480,0 495,0 495,18 510,18 510,0 525,0 525,18 540,18 540,0 555,0 555,18 570,18 570,0 585,0 585,18 600,18" fill="none" stroke="#1B4F72" stroke-width="1.5"/>
</g>

<!-- tick_100hz (1-clock pulse) -->
<text x="15" y="311" class="label-b" fill="#1E8449">tick_100hz</text>
<text x="15" y="323" class="label-s" fill="#1E8449">(1-clk pulse)</text>
<g transform="translate(100,296)">
  <!-- 1-clock-wide pulses at x=150, 450 -->
  <polyline points="0,18 150,18 150,0 180,0 180,18 450,18 450,0 480,0 480,18 600,18" fill="none" stroke="#1E8449" stroke-width="2.5"/>
  <!-- pulse width annotations -->
  <line x1="150" y1="24" x2="180" y2="24" stroke="#1E8449" stroke-width="1"/>
  <text x="165" y="36" text-anchor="middle" class="label-s" fill="#1E8449">20ns</text>
  <line x1="450" y1="24" x2="480" y2="24" stroke="#1E8449" stroke-width="1"/>
  <text x="465" y="36" text-anchor="middle" class="label-s" fill="#1E8449">20ns</text>
</g>

<!-- digit driven by clk_50m + tick enable -->
<text x="15" y="360" class="label-b">digit</text>
<text x="15" y="372" class="label-s">(clk=50MHz)</text>
<g transform="translate(100,345)">
  <!-- changes on posedge of clk_50m WHEN tick=1 → at x=180, 480 -->
  <rect x="0" y="0" width="180" height="24" fill="#D5F5E3" stroke="#1E8449" rx="2"/>
  <text x="90" y="16" text-anchor="middle" class="val">0</text>
  <rect x="180" y="0" width="300" height="24" fill="#D5F5E3" stroke="#1E8449" rx="2"/>
  <text x="330" y="16" text-anchor="middle" class="val">1</text>
  <rect x="480" y="0" width="120" height="24" fill="#D5F5E3" stroke="#1E8449" rx="2"/>
  <text x="540" y="16" text-anchor="middle" class="val">2</text>
</g>

<!-- Good annotations for Method B -->
<g transform="translate(100,380)">
  <line x1="180" y1="0" x2="180" y2="-38" stroke="#1E8449" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="480" y1="0" x2="480" y2="-38" stroke="#1E8449" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="185" y="12" class="good">↑ sampled on posedge clk_50m</text>
  <text x="185" y="25" class="good">  same clock domain everywhere</text>
  <text x="185" y="38" class="good">  no skew, no CDC, clean timing</text>
</g>

<!-- ═══════════════════════════════════════════════ -->
<!-- Code comparison at bottom                      -->
<!-- ═══════════════════════════════════════════════ -->
<rect x="15" y="430" width="345" height="78" rx="6" fill="#FADBD8" stroke="#E74C3C" stroke-width="1.5"/>
<text x="187" y="448" text-anchor="middle" class="warn">Method A: digit clocked by clk_100hz</text>
<text x="25" y="466" font-family="Courier New" font-size="9" fill="#333">always @(posedge clk_100hz)  // ✗ FF output</text>
<text x="25" y="480" font-family="Courier New" font-size="9" fill="#333">  digit &lt;= digit + 1;      // every edge</text>
<text x="25" y="498" font-family="Courier New" font-size="9" fill="#E74C3C">// 2 clock domains → skew, CDC, SDC</text>

<rect x="400" y="430" width="365" height="78" rx="6" fill="#D5F5E3" stroke="#1E8449" stroke-width="1.5"/>
<text x="582" y="448" text-anchor="middle" class="good">Method B: digit clocked by clk_50m</text>
<text x="410" y="466" font-family="Courier New" font-size="9" fill="#333">always @(posedge clk_50m)   // ✓ global clk</text>
<text x="410" y="480" font-family="Courier New" font-size="9" fill="#333">  if (tick) digit &lt;= digit + 1;</text>
<text x="410" y="498" font-family="Courier New" font-size="9" fill="#1E8449">// 1 clock domain → clean, safe, simple</text>
</svg>
