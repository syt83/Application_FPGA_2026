<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 430">
<style>
  text { font-family: 'Segoe UI', Arial, sans-serif; }
  .title { font-size: 16px; font-weight: bold; fill: #1B4F72; }
  .label-b { font-size: 12px; fill: #2C3E50; font-weight: bold; }
  .label-s { font-size: 10px; fill: #666; }
  .port { font-family: 'Courier New', monospace; font-size: 9px; fill: #1B4F72; }
  .sig { font-size: 9px; fill: #E67E22; font-weight: bold; }
  .sigG { font-size: 9px; fill: #1E8449; font-weight: bold; }
  .sigR { font-size: 9px; fill: #E74C3C; font-weight: bold; }
</style>
<defs>
  <marker id="mg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 0L10 5L0 10z" fill="#1E8449"/></marker>
  <marker id="mo" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 0L10 5L0 10z" fill="#E67E22"/></marker>
  <marker id="mp" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 0L10 5L0 10z" fill="#8E44AD"/></marker>
  <marker id="mr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 0L10 5L0 10z" fill="#E74C3C"/></marker>
  <marker id="my" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 0L10 5L0 10z" fill="#666"/></marker>
</defs>
<text x="360" y="22" text-anchor="middle" class="title">Vending Machine — Module Interconnect</text>

<!-- ====== External Inputs (left) ====== -->
<text x="12" y="100" class="label-b" fill="#1B4F72">KEY[0]</text>
<text x="12" y="113" class="label-s">(coin_10)</text>

<text x="12" y="165" class="label-b" fill="#1B4F72">KEY[1]</text>
<text x="12" y="178" class="label-s">(coin_20)</text>

<text x="12" y="230" class="label-b" fill="#1B4F72">KEY[2]</text>
<text x="12" y="243" class="label-s">(cancel)</text>

<!-- ====== btn_debounce x3 ====== -->
<rect x="85" y="82" width="120" height="42" rx="6" fill="#FDEBD0" stroke="#E67E22" stroke-width="1.5"/>
<text x="145" y="100" text-anchor="middle" class="label-b" fill="#E67E22">btn_debounce</text>
<text x="145" y="115" text-anchor="middle" class="label-s">u_db0</text>

<rect x="85" y="147" width="120" height="42" rx="6" fill="#FDEBD0" stroke="#E67E22" stroke-width="1.5"/>
<text x="145" y="165" text-anchor="middle" class="label-b" fill="#E67E22">btn_debounce</text>
<text x="145" y="180" text-anchor="middle" class="label-s">u_db1</text>

<rect x="85" y="212" width="120" height="42" rx="6" fill="#FDEBD0" stroke="#E67E22" stroke-width="1.5"/>
<text x="145" y="230" text-anchor="middle" class="label-b" fill="#E67E22">btn_debounce</text>
<text x="145" y="245" text-anchor="middle" class="label-s">u_db2</text>

<!-- KEY -> debounce -->
<path d="M60,103 C70,103 75,103 83,103" fill="none" stroke="#666" stroke-width="1.5" marker-end="url(#my)"/>
<path d="M60,168 C70,168 75,168 83,168" fill="none" stroke="#666" stroke-width="1.5" marker-end="url(#my)"/>
<path d="M60,233 C70,233 75,233 83,233" fill="none" stroke="#666" stroke-width="1.5" marker-end="url(#my)"/>

<!-- ====== vending_fsm ====== -->
<rect x="280" y="60" width="170" height="250" rx="8" fill="#D5F5E3" stroke="#1E8449" stroke-width="2"/>
<text x="365" y="82" text-anchor="middle" class="label-b" fill="#1E8449">vending_fsm</text>

<!-- FSM input ports -->
<text x="290" y="115" class="port">coin_10_pulse</text>
<text x="290" y="170" class="port">coin_20_pulse</text>
<text x="290" y="240" class="port">cancel_pulse</text>

<!-- FSM output ports -->
<text x="365" y="115" class="port" text-anchor="middle">dispense</text>
<text x="365" y="145" class="port" text-anchor="middle">bal_tens[3:0]</text>
<text x="365" y="165" class="port" text-anchor="middle">bal_ones[3:0]</text>
<text x="365" y="200" class="port" text-anchor="middle">chg_tens[3:0]</text>
<text x="365" y="220" class="port" text-anchor="middle">chg_ones[3:0]</text>

<!-- debounce -> FSM (curved) -->
<path d="M205,103 C230,103 250,108 278,112" fill="none" stroke="#E67E22" stroke-width="1.5" marker-end="url(#mo)"/>
<text x="235" y="98" class="sig">pulse</text>
<path d="M205,168 C240,168 260,168 278,168" fill="none" stroke="#E67E22" stroke-width="1.5" marker-end="url(#mo)"/>
<text x="235" y="162" class="sig">pulse</text>
<path d="M205,233 C230,233 250,237 278,238" fill="none" stroke="#E67E22" stroke-width="1.5" marker-end="url(#mo)"/>
<text x="235" y="228" class="sig">pulse</text>

<!-- ====== seg7_decoder x4 ====== -->
<rect x="530" y="75" width="100" height="38" rx="6" fill="#E8DAEF" stroke="#8E44AD" stroke-width="1.5"/>
<text x="580" y="93" text-anchor="middle" class="label-b" fill="#8E44AD">seg7_dec</text>
<text x="580" y="106" text-anchor="middle" class="label-s">u_h1 (bal tens)</text>

<rect x="530" y="125" width="100" height="38" rx="6" fill="#E8DAEF" stroke="#8E44AD" stroke-width="1.5"/>
<text x="580" y="143" text-anchor="middle" class="label-b" fill="#8E44AD">seg7_dec</text>
<text x="580" y="156" text-anchor="middle" class="label-s">u_h0 (bal ones)</text>

<rect x="530" y="190" width="100" height="38" rx="6" fill="#E8DAEF" stroke="#8E44AD" stroke-width="1.5"/>
<text x="580" y="208" text-anchor="middle" class="label-b" fill="#8E44AD">seg7_dec</text>
<text x="580" y="221" text-anchor="middle" class="label-s">u_h3 (chg tens)</text>

<rect x="530" y="240" width="100" height="38" rx="6" fill="#E8DAEF" stroke="#8E44AD" stroke-width="1.5"/>
<text x="580" y="258" text-anchor="middle" class="label-b" fill="#8E44AD">seg7_dec</text>
<text x="580" y="271" text-anchor="middle" class="label-s">u_h2 (chg ones)</text>

<!-- FSM -> seg7 (curved) -->
<path d="M450,142 C475,138 500,130 528,94" fill="none" stroke="#1E8449" stroke-width="1.5" marker-end="url(#mg)"/>
<text x="480" y="118" class="sigG">bal_tens</text>

<path d="M450,162 C480,158 500,152 528,144" fill="none" stroke="#1E8449" stroke-width="1.5" marker-end="url(#mg)"/>
<text x="480" y="155" class="sigG">bal_ones</text>

<path d="M450,197 C480,198 500,200 528,209" fill="none" stroke="#1E8449" stroke-width="1.5" marker-end="url(#mg)"/>
<text x="480" y="195" class="sigG">chg_tens</text>

<path d="M450,217 C475,225 500,238 528,259" fill="none" stroke="#1E8449" stroke-width="1.5" marker-end="url(#mg)"/>
<text x="480" y="237" class="sigG">chg_ones</text>

<!-- ====== External Outputs (right) ====== -->
<!-- seg7 -> HEX -->
<path d="M630,94 C650,94 660,94 678,94" fill="none" stroke="#E74C3C" stroke-width="1.5" marker-end="url(#mr)"/>
<text x="682" y="92" class="label-b" fill="#E74C3C">HEX1</text>
<text x="682" y="104" class="label-s">bal tens</text>

<path d="M630,144 C650,144 660,144 678,144" fill="none" stroke="#E74C3C" stroke-width="1.5" marker-end="url(#mr)"/>
<text x="682" y="142" class="label-b" fill="#E74C3C">HEX0</text>
<text x="682" y="154" class="label-s">bal ones</text>

<path d="M630,209 C650,209 660,209 678,209" fill="none" stroke="#E74C3C" stroke-width="1.5" marker-end="url(#mr)"/>
<text x="682" y="207" class="label-b" fill="#E74C3C">HEX3</text>
<text x="682" y="219" class="label-s">chg tens</text>

<path d="M630,259 C650,259 660,259 678,259" fill="none" stroke="#E74C3C" stroke-width="1.5" marker-end="url(#mr)"/>
<text x="682" y="257" class="label-b" fill="#E74C3C">HEX2</text>
<text x="682" y="269" class="label-s">chg ones</text>

<!-- FSM -> LED dispense (curved, goes below seg7 block) -->
<path d="M450,112 C470,108 490,108 510,108 C530,108 540,300 600,320 C640,330 660,330 678,330" fill="none" stroke="#E74C3C" stroke-width="1.5" marker-end="url(#mr)"/>
<text x="682" y="328" class="label-b" fill="#E74C3C">LED[0]</text>
<text x="682" y="341" class="label-s">dispense</text>
<text x="510" y="320" class="sigR">dispense</text>

<!-- ====== clk/rst (dashed, bottom) ====== -->
<path d="M12,370 C80,370 120,370 145,370 C145,370 145,260 145,254" fill="none" stroke="#8E44AD" stroke-width="1" stroke-dasharray="4,2"/>
<path d="M145,370 C250,370 365,370 365,370 C365,370 365,315 365,312" fill="none" stroke="#8E44AD" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#mp)"/>
<text x="12" y="367" class="label-b" fill="#8E44AD">CLOCK_50</text>
<text x="12" y="382" class="label-b" fill="#8E44AD">rst_n</text>
<text x="240" y="382" class="label-s" fill="#8E44AD">clk, rst_n (shared to all sequential modules)</text>

<!-- ====== Display layout legend ====== -->
<rect x="15" y="400" width="690" height="25" rx="4" fill="#F8F9FA" stroke="#AEB6BF"/>
<text x="360" y="410" text-anchor="middle" class="label-s">Display:  HEX3:HEX2 = change (chg_tens : chg_ones)  |  HEX1:HEX0 = balance (bal_tens : bal_ones)  |  LED[0] = dispense</text>
</svg>
