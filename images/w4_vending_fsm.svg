<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 250">
<style>
  text { font-family: 'Segoe UI', Arial, sans-serif; }
  .title { font-size: 16px; font-weight: bold; fill: #1B4F72; }
  .subtitle { font-size: 12px; fill: #666; }
  .label { font-size: 12px; fill: #2C3E50; }
  .label-b { font-size: 12px; fill: #2C3E50; font-weight: bold; }
  .label-s { font-size: 10px; fill: #666; }
  .code { font-family: 'Courier New', monospace; font-size: 10px; fill: #2C3E50; }
  .warn { font-size: 11px; fill: #E74C3C; font-weight: bold; }
  .note { font-size: 10px; fill: #1B4F72; }
</style>
<defs><marker id="av" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="#1E8449"/></marker>
<marker id="avr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="#E74C3C"/></marker></defs>
<text x="325" y="18" text-anchor="middle" class="title">Vending Machine FSM (Price: 30)</text>
<circle cx="65" cy="110" r="32" fill="#D6EAF8" stroke="#1B4F72" stroke-width="2"/><text x="65" y="115" text-anchor="middle" class="label-b">IDLE</text>
<circle cx="185" cy="110" r="32" fill="#D5F5E3" stroke="#1E8449" stroke-width="2"/><text x="185" y="108" text-anchor="middle" class="label-b">C10</text><text x="185" y="122" text-anchor="middle" class="label-s">10</text>
<circle cx="305" cy="110" r="32" fill="#D5F5E3" stroke="#1E8449" stroke-width="2"/><text x="305" y="108" text-anchor="middle" class="label-b">C20</text><text x="305" y="122" text-anchor="middle" class="label-s">20</text>
<circle cx="425" cy="110" r="32" fill="#D5F5E3" stroke="#1E8449" stroke-width="2"/><text x="425" y="108" text-anchor="middle" class="label-b">C30</text><text x="425" y="122" text-anchor="middle" class="label-s">30</text>
<circle cx="565" cy="110" r="32" fill="#FDEBD0" stroke="#E67E22" stroke-width="2"/><text x="565" y="108" text-anchor="middle" class="label-b">DIS-</text><text x="565" y="122" text-anchor="middle" class="label-b">PENSE</text>
<!-- Forward -->
<line x1="99" y1="105" x2="151" y2="105" stroke="#1E8449" stroke-width="2" marker-end="url(#av)"/><text x="125" y="98" text-anchor="middle" class="label-s" fill="#1E8449">coin10</text>
<line x1="219" y1="105" x2="271" y2="105" stroke="#1E8449" stroke-width="2" marker-end="url(#av)"/><text x="245" y="98" text-anchor="middle" class="label-s" fill="#1E8449">coin10</text>
<line x1="339" y1="105" x2="391" y2="105" stroke="#1E8449" stroke-width="2" marker-end="url(#av)"/><text x="365" y="98" text-anchor="middle" class="label-s" fill="#1E8449">coin10</text>
<line x1="459" y1="105" x2="531" y2="105" stroke="#E67E22" stroke-width="2" marker-end="url(#av)"/><text x="495" y="98" text-anchor="middle" class="label-s" fill="#E67E22">auto</text>
<!-- Skip with coin20 -->
<path d="M85,78 Q185,30 285,78" fill="none" stroke="#1B4F72" stroke-width="1.5" marker-end="url(#av)"/><text x="185" y="45" text-anchor="middle" class="label-s" fill="#1B4F72">coin20</text>
<path d="M205,78 Q305,30 405,78" fill="none" stroke="#1B4F72" stroke-width="1.5" marker-end="url(#av)"/><text x="305" y="35" text-anchor="middle" class="label-s" fill="#1B4F72">coin20</text>
<!-- Return -->
<path d="M565,144 Q325,210 65,144" fill="none" stroke="#E74C3C" stroke-width="2" marker-end="url(#avr)"/>
<text x="325" y="205" text-anchor="middle" class="label-s" fill="#E74C3C">done -> IDLE</text>
<!-- Cancel -->
<rect x="30" y="225" width="590" height="20" rx="4" fill="#FADBD8"/><text x="325" y="240" text-anchor="middle" class="label-s" fill="#E74C3C">cancel: any COIN state -> IDLE (refund deposited amount)</text>
</svg>