<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
<style>
  text { font-family: 'Segoe UI', Arial, sans-serif; }
  .title { font-size: 16px; font-weight: bold; fill: #1B4F72; }
  .label-b { font-size: 12px; fill: #2C3E50; font-weight: bold; }
  .label-s { font-size: 10px; fill: #666; }
  .sig { font-size: 10px; fill: #E67E22; font-weight: bold; }
  .sigB { font-size: 10px; fill: #1B4F72; font-weight: bold; }
  .sigG { font-size: 10px; fill: #1E8449; font-weight: bold; }
  .sigR { font-size: 10px; fill: #E74C3C; font-weight: bold; }
  .sigP { font-size: 10px; fill: #8E44AD; font-weight: bold; }
  .rst { font-family: 'Courier New', monospace; font-size: 9px; fill: #E74C3C; }
</style>
<defs>
  <marker id="mg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="#1E8449"/></marker>
  <marker id="mo" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="#E67E22"/></marker>
  <marker id="mb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="#1B4F72"/></marker>
  <marker id="mr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="#E74C3C"/></marker>
  <marker id="mp" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="#8E44AD"/></marker>
  <marker id="my" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="#666"/></marker>
</defs>
<text x="360" y="24" text-anchor="middle" class="title">Calculator — System Block Diagram</text>

<!-- ═══ External Inputs ═══ -->
<text x="10" y="75" class="label-b" fill="#1B4F72">SW[7:0]</text>
<text x="10" y="88" class="label-s">(data)</text>

<text x="10" y="160" class="label-b" fill="#1B4F72">KEY[1]</text>
<text x="10" y="173" class="label-s">(enter)</text>

<text x="10" y="210" class="label-b" fill="#1B4F72">KEY[2]</text>
<text x="10" y="223" class="label-s">(op)</text>

<!-- ═══ Controller ═══ -->
<rect x="100" y="120" width="160" height="120" rx="8" fill="#D6EAF8" stroke="#1B4F72" stroke-width="2"/>
<text x="180" y="145" text-anchor="middle" class="label-b" fill="#1B4F72">Controller</text>
<text x="180" y="162" text-anchor="middle" class="label-s">(FSM)</text>
<text x="180" y="182" text-anchor="middle" class="label-s">S_A → S_OP</text>
<text x="180" y="196" text-anchor="middle" class="label-s">→ S_B → S_SHOW</text>
<text x="180" y="216" text-anchor="middle" class="label-s">generates control signals</text>
<line x1="140" y1="107" x2="140" y2="120" stroke="#E74C3C" stroke-width="1"/>
<text x="147" y="114" class="rst">rst_n</text>

<!-- KEY → Controller -->
<line x1="58" y1="163" x2="98" y2="163" stroke="#666" stroke-width="1.5" marker-end="url(#my)"/>
<line x1="58" y1="213" x2="75" y2="213" stroke="#666" stroke-width="1.5"/>
<line x1="75" y1="213" x2="75" y2="193" stroke="#666" stroke-width="1.5"/>
<line x1="75" y1="193" x2="98" y2="193" stroke="#666" stroke-width="1.5" marker-end="url(#my)"/>
<text x="68" y="155" class="sig">btn_enter</text>
<text x="68" y="208" class="sig">btn_op</text>

<!-- ═══ Datapath ═══ -->
<rect x="350" y="50" width="220" height="270" rx="8" fill="#D5F5E3" stroke="#1E8449" stroke-width="2"/>
<text x="460" y="72" text-anchor="middle" class="label-b" fill="#1E8449">Datapath</text>

<!-- Reg A, Reg B -->
<rect x="370" y="85" width="80" height="35" rx="5" fill="#FEF9E7" stroke="#B7950B" stroke-width="1.5"/>
<text x="410" y="107" text-anchor="middle" class="label-b">Reg A</text>
<rect x="470" y="85" width="80" height="35" rx="5" fill="#FEF9E7" stroke="#B7950B" stroke-width="1.5"/>
<text x="510" y="107" text-anchor="middle" class="label-b">Reg B</text>

<!-- ALU -->
<rect x="390" y="145" width="140" height="50" rx="6" fill="#D1F2EB" stroke="#148F77" stroke-width="2"/>
<text x="460" y="168" text-anchor="middle" class="label-b" fill="#148F77">ALU (8 ops)</text>
<text x="460" y="183" text-anchor="middle" class="label-s">ADD SUB AND OR XOR SHL SHR SLT</text>

<!-- Reg Result -->
<rect x="400" y="220" width="120" height="35" rx="5" fill="#FEF9E7" stroke="#B7950B" stroke-width="1.5"/>
<text x="460" y="242" text-anchor="middle" class="label-b">Reg Result</text>

<!-- Flags -->
<rect x="400" y="275" width="120" height="30" rx="5" fill="#FADBD8" stroke="#E74C3C" stroke-width="1"/>
<text x="460" y="294" text-anchor="middle" class="label-s" fill="#E74C3C">Flags: zero, carry, neg</text>

<!-- Internal Datapath wiring -->
<line x1="410" y1="120" x2="410" y2="143" stroke="#B7950B" stroke-width="1.5" marker-end="url(#mg)"/>
<line x1="510" y1="120" x2="510" y2="135" stroke="#B7950B" stroke-width="1.5"/>
<line x1="510" y1="135" x2="490" y2="135" stroke="#B7950B" stroke-width="1.5"/>
<line x1="490" y1="135" x2="490" y2="143" stroke="#B7950B" stroke-width="1.5" marker-end="url(#mg)"/>
<line x1="460" y1="195" x2="460" y2="218" stroke="#148F77" stroke-width="1.5" marker-end="url(#mg)"/>
<text x="467" y="210" class="sigG">alu_out</text>

<!-- SW → Reg A, Reg B (data bus) -->
<line x1="55" y1="78" x2="68" y2="78" stroke="#666" stroke-width="1.5"/>
<line x1="68" y1="78" x2="68" y2="50" stroke="#666" stroke-width="1.5"/>
<line x1="68" y1="50" x2="410" y2="50" stroke="#666" stroke-width="1.5"/>
<line x1="410" y1="50" x2="410" y2="83" stroke="#666" stroke-width="1.5" marker-end="url(#my)"/>
<line x1="510" y1="50" x2="510" y2="83" stroke="#666" stroke-width="1.5" marker-end="url(#my)"/>
<text x="240" y="45" text-anchor="middle" class="label-s">SW[7:0]</text>

<!-- ═══ Controller → Datapath (control signals) ═══ -->
<line x1="260" y1="145" x2="310" y2="145" stroke="#1B4F72" stroke-width="1.5"/>
<line x1="310" y1="145" x2="310" y2="100" stroke="#1B4F72" stroke-width="1.5"/>
<line x1="310" y1="100" x2="368" y2="100" stroke="#1B4F72" stroke-width="1.5" marker-end="url(#mb)"/>
<text x="320" y="93" class="sigB">load_a</text>

<line x1="260" y1="160" x2="320" y2="160" stroke="#1B4F72" stroke-width="1.5"/>
<line x1="320" y1="160" x2="320" y2="106" stroke="#1B4F72" stroke-width="1.5"/>
<line x1="320" y1="106" x2="468" y2="106" stroke="#1B4F72" stroke-width="1.5" marker-end="url(#mb)"/>
<text x="395" y="100" class="sigB">load_b</text>

<line x1="260" y1="180" x2="330" y2="180" stroke="#1B4F72" stroke-width="1.5"/>
<line x1="330" y1="180" x2="330" y2="170" stroke="#1B4F72" stroke-width="1.5"/>
<line x1="330" y1="170" x2="388" y2="170" stroke="#1B4F72" stroke-width="1.5" marker-end="url(#mb)"/>
<text x="347" y="164" class="sigB">alu_op</text>

<!-- ═══ Flags → Controller (feedback) ═══ -->
<line x1="400" y1="290" x2="340" y2="290" stroke="#E74C3C" stroke-width="1.5"/>
<line x1="340" y1="290" x2="340" y2="210" stroke="#E74C3C" stroke-width="1.5"/>
<line x1="340" y1="210" x2="260" y2="210" stroke="#E74C3C" stroke-width="1.5" marker-end="url(#mr)"/>
<text x="348" y="255" class="sigR">flags</text>

<!-- ═══ Outputs ═══ -->

<!-- Display MUX → seg7 → HEX -->
<rect x="350" y="340" width="110" height="30" rx="5" fill="#E8DAEF" stroke="#8E44AD" stroke-width="1.5"/>
<text x="405" y="359" text-anchor="middle" class="label-b" fill="#8E44AD">seg7_dec x4</text>

<line x1="460" y1="255" x2="460" y2="330" stroke="#8E44AD" stroke-width="1.5"/>
<line x1="460" y1="330" x2="405" y2="330" stroke="#8E44AD" stroke-width="1.5"/>
<line x1="405" y1="330" x2="405" y2="338" stroke="#8E44AD" stroke-width="1.5" marker-end="url(#mp)"/>

<!-- state → display MUX select -->
<line x1="260" y1="195" x2="285" y2="195" stroke="#1B4F72" stroke-width="1.5"/>
<line x1="285" y1="195" x2="285" y2="355" stroke="#1B4F72" stroke-width="1.5"/>
<line x1="285" y1="355" x2="348" y2="355" stroke="#1B4F72" stroke-width="1.5" marker-end="url(#mb)"/>
<text x="290" y="310" class="sigB">state</text>

<line x1="405" y1="370" x2="405" y2="390" stroke="#E74C3C" stroke-width="1.5" marker-end="url(#mr)"/>
<text x="410" y="400" class="label-b" fill="#E74C3C">HEX3 ~ HEX0</text>

<!-- Flags → LED -->
<line x1="520" y1="290" x2="580" y2="290" stroke="#E74C3C" stroke-width="1.5"/>
<line x1="580" y1="290" x2="580" y2="390" stroke="#E74C3C" stroke-width="1.5" marker-end="url(#mr)"/>
<text x="585" y="400" class="label-b" fill="#E74C3C">LED</text>
<text x="585" y="413" class="label-s">{neg,carry,zero}</text>

<!-- ═══ CLOCK ═══ -->
<rect x="15" y="370" width="690" height="24" rx="4" fill="#F8F9FA" stroke="#AEB6BF"/>
<text x="360" y="386" text-anchor="middle" class="label-s">Controller decides WHAT to do (FSM)  |  Datapath does the actual DATA processing (ALU + Registers)</text>
</svg>
