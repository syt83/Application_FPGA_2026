<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300">
<style>
  text { font-family: 'Segoe UI', Arial, sans-serif; }
  .title { font-size: 16px; font-weight: bold; fill: #1B4F72; }
  .subtitle { font-size: 12px; fill: #666; }
  .label { font-size: 12px; fill: #2C3E50; }
  .label-b { font-size: 12px; fill: #2C3E50; font-weight: bold; }
  .label-s { font-size: 10px; fill: #666; }
  .code { font-family: 'Courier New', monospace; font-size: 10px; fill: #2C3E50; }
  .warn { font-size: 11px; fill: #E74C3C; font-weight: bold; }
  .note { font-size: 10px; fill: #1B4F72; }
</style>
<text x="360" y="22" text-anchor="middle" class="title">Blocking (=) vs Non-blocking (&lt;=) in Sequential Logic</text>
<!-- Blocking side -->
<rect x="10" y="38" width="340" height="250" rx="8" fill="#FADBD8" stroke="#E74C3C" stroke-width="2"/>
<text x="180" y="58" text-anchor="middle" class="label-b" fill="#E74C3C">Blocking (=) — WRONG in seq!</text>
<text x="25" y="80" class="code">always @(posedge clk) begin</text>
<text x="25" y="95" class="code">  a = b;   // Step1: a gets b NOW</text>
<text x="25" y="110" class="code">  c = a;   // Step2: c gets NEW a</text>
<text x="25" y="125" class="code">end        // Result: c = b !</text>
<rect x="25" y="140" width="310" height="55" rx="4" fill="#FFF" stroke="#E74C3C"/>
<text x="30" y="158" class="warn">Result: c = b (no pipeline!)</text>
<text x="30" y="175" class="warn">Simulation != Synthesis mismatch</text>
<text x="30" y="195" class="label-s">a and c both get same value in same cycle</text>
<rect x="25" y="210" width="310" height="30" rx="4" fill="#E74C3C"/>
<text x="180" y="230" text-anchor="middle" fill="white" font-size="12" font-weight="bold">DO NOT use in sequential logic</text>
<!-- Non-blocking side -->
<rect x="370" y="38" width="340" height="250" rx="8" fill="#D5F5E3" stroke="#1E8449" stroke-width="2"/>
<text x="540" y="58" text-anchor="middle" class="label-b" fill="#1E8449">Non-blocking (&lt;=) — CORRECT</text>
<text x="385" y="80" class="code">always @(posedge clk) begin</text>
<text x="385" y="95" class="code">  a &lt;= b;  // Schedule: a gets OLD b</text>
<text x="385" y="110" class="code">  c &lt;= a;  // Schedule: c gets OLD a</text>
<text x="385" y="125" class="code">end        // Result: pipeline!</text>
<rect x="385" y="140" width="310" height="55" rx="4" fill="#FFF" stroke="#1E8449"/>
<text x="390" y="158" class="label-b" fill="#1E8449">Result: c = old_a (pipeline!)</text>
<text x="390" y="175" class="label-b" fill="#1E8449">Simulation = Synthesis match</text>
<text x="390" y="195" class="label-s">Each signal captures value from BEFORE the edge</text>
<rect x="385" y="210" width="310" height="30" rx="4" fill="#1E8449"/>
<text x="540" y="230" text-anchor="middle" fill="white" font-size="12" font-weight="bold">ALWAYS use in sequential logic</text>
</svg>