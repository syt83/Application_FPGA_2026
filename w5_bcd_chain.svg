<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 130">
<style>
  text { font-family: 'Segoe UI', Arial, sans-serif; }
  .title { font-size: 16px; font-weight: bold; fill: #1B4F72; }
  .subtitle { font-size: 12px; fill: #666; }
  .label { font-size: 12px; fill: #2C3E50; }
  .label-b { font-size: 12px; fill: #2C3E50; font-weight: bold; }
  .label-s { font-size: 10px; fill: #666; }
  .code { font-family: 'Courier New', monospace; font-size: 10px; fill: #2C3E50; }
  .warn { font-size: 11px; fill: #E74C3C; font-weight: bold; }
  .note { font-size: 10px; fill: #1B4F72; }
</style>
<defs><marker id="ab" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="#1E8449"/></marker></defs>
<text x="300" y="18" text-anchor="middle" class="title">BCD Counter Chain — Carry Propagation</text>
<rect x="30" y="35" width="100" height="65" rx="6" fill="#D6EAF8" stroke="#1B4F72"/><text x="80" y="55" text-anchor="middle" class="label-b">tick_in</text><text x="80" y="72" text-anchor="middle" class="label-s">100Hz</text><text x="80" y="88" text-anchor="middle" class="code">(combinational)</text>
<line x1="130" y1="67" x2="158" y2="67" stroke="#1E8449" stroke-width="2" marker-end="url(#ab)"/>
<rect x="160" y="35" width="90" height="65" rx="6" fill="#D5F5E3" stroke="#1E8449" stroke-width="2"/><text x="205" y="55" text-anchor="middle" class="label-b">digit0</text><text x="205" y="72" text-anchor="middle" class="label-s">0~9</text><text x="205" y="88" text-anchor="middle" class="code">carry = (9&amp;&amp;tick)</text>
<line x1="250" y1="67" x2="278" y2="67" stroke="#1E8449" stroke-width="2" marker-end="url(#ab)"/><text x="260" y="58" class="label-s" fill="#1E8449">carry</text>
<rect x="280" y="35" width="90" height="65" rx="6" fill="#D5F5E3" stroke="#1E8449" stroke-width="2"/><text x="325" y="55" text-anchor="middle" class="label-b">digit1</text><text x="325" y="72" text-anchor="middle" class="label-s">0~9</text>
<line x1="370" y1="67" x2="398" y2="67" stroke="#1E8449" stroke-width="2" marker-end="url(#ab)"/><text x="380" y="58" class="label-s" fill="#1E8449">carry</text>
<rect x="400" y="35" width="90" height="65" rx="6" fill="#D5F5E3" stroke="#1E8449" stroke-width="2"/><text x="445" y="55" text-anchor="middle" class="label-b">digit2</text><text x="445" y="72" text-anchor="middle" class="label-s">0~9</text>
<line x1="490" y1="67" x2="518" y2="67" stroke="#1E8449" stroke-width="2" marker-end="url(#ab)"/>
<text x="525" y="72" class="label-s">...</text>
<text x="300" y="120" text-anchor="middle" class="label-s">carry is combinational (assign) — same-cycle propagation across stages</text>
</svg>