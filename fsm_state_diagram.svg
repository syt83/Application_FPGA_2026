<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: Arial, sans-serif; }
    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; font-weight: 400; }
  </style>
</defs>

<!-- Background -->
<rect width="680" height="520" fill="white"/>

<!-- Reset arrow from top -->
<path d="M340 30 L340 58" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="352" y="48" fill="#888780">rst_n = 0</text>

<!-- IDLE node -->
<circle cx="340" cy="120" r="62" fill="#F5F5F5" stroke="#1D9E75" stroke-width="1.5"/>
<text class="th" x="340" y="116" text-anchor="middle" dominant-baseline="central" fill="#085041">IDLE</text>
<text class="ts" x="340" y="136" text-anchor="middle" fill="#0F6E56">busy=0, complete=0</text>

<!-- RUNNING node -->
<circle cx="160" cy="340" r="62" fill="#F5F5F5" stroke="#185FA5" stroke-width="1.5"/>
<text class="th" x="160" y="336" text-anchor="middle" dominant-baseline="central" fill="#0C447C">RUNNING</text>
<text class="ts" x="160" y="356" text-anchor="middle" fill="#185FA5">busy=1, complete=0</text>

<!-- FINISH node -->
<circle cx="520" cy="340" r="62" fill="#F5F5F5" stroke="#993C1D" stroke-width="1.5"/>
<text class="th" x="520" y="336" text-anchor="middle" dominant-baseline="central" fill="#712B13">FINISH</text>
<text class="ts" x="520" y="356" text-anchor="middle" fill="#993C1D">busy=0, complete=1</text>

<!-- IDLE → RUNNING (go=1) -->
<path d="M294 162 C240 200 200 260 200 282" fill="none" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="186" y="210" width="68" height="20" rx="4" fill="white" opacity="0.9"/>
<text class="ts" x="220" y="224" text-anchor="middle" fill="#185FA5">go = 1</text>

<!-- RUNNING → FINISH (done_sig=1) -->
<path d="M222 340 L458 340" fill="none" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="294" y="326" width="92" height="20" rx="4" fill="white" opacity="0.9"/>
<text class="ts" x="340" y="340" text-anchor="middle" fill="#185FA5">done_sig = 1</text>

<!-- FINISH → IDLE (unconditional) -->
<path d="M564 296 C600 220 500 140 400 128" fill="none" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="566" y="212" width="76" height="20" rx="4" fill="white" opacity="0.9"/>
<text class="ts" x="604" y="226" text-anchor="middle" fill="#185FA5">(always)</text>

<!-- IDLE self-loop (go=0) -->
<path d="M380 82 C430 40 430 90 388 102" fill="none" stroke="#B4B2A9" stroke-width="1.2" marker-end="url(#arrow)"/>
<rect x="410" y="54" width="52" height="20" rx="4" fill="white" opacity="0.9"/>
<text class="ts" x="436" y="68" text-anchor="middle" fill="#888780">go = 0</text>

<!-- RUNNING self-loop (done_sig=0) -->
<path d="M100 310 C56 280 56 370 104 370" fill="none" stroke="#B4B2A9" stroke-width="1.2" marker-end="url(#arrow)"/>
<rect x="20" y="328" width="80" height="20" rx="4" fill="white" opacity="0.9"/>
<text class="ts" x="60" y="342" text-anchor="middle" fill="#888780">done_sig=0</text>

<!-- Legend -->
<rect x="40" y="455" width="600" height="50" rx="8" fill="#F8F8F6" stroke="#D3D1C7" stroke-width="0.5"/>
<line x1="64" y1="480" x2="104" y2="480" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="112" y="484" fill="#5F5E5A">조건부 전이</text>
<line x1="240" y1="480" x2="280" y2="480" stroke="#B4B2A9" stroke-width="1.2" marker-end="url(#arrow)"/>
<text class="ts" x="288" y="484" fill="#5F5E5A">유지 (self-loop)</text>
<circle cx="448" cy="480" r="7" fill="#F8F8F6" stroke="#1D9E75" stroke-width="1.5"/>
<text class="ts" x="464" y="484" fill="#5F5E5A">상태 (Moore 출력)</text>
</svg>
